services:
  api:
    environment: &scm_env
      - C2C__AUTH__GITHUB__CLIENT_ID
      - C2C__AUTH__GITHUB__CLIENT_SECRET
      - C2C__AUTH__GITHUB__SECRET=a-long-secret-a-long-secret
      - C2C__AUTH__GITHUB__PROXY_URL=https://geoservices-int.camptocamp.com/redirect
    volumes:
      - ./app/shared_config_manager:/app/shared_config_manager:ro
      # - ../c2casgiutils/c2casgiutils:/venv/lib/python3.12/site-packages/c2casgiutils:ro
    ports:
      - '8491:8080'

  api_inline:
    environment: *scm_env
    volumes:
      - ./app/shared_config_manager:/app/shared_config_manager:ro
      # - ../c2casgiutils/c2casgiutils:/venv/lib/python3.12/site-packages/c2casgiutils:ro
    ports:
      - '8492:8080'

  api_file:
    environment: *scm_env
    volumes:
      - ./app/shared_config_manager:/app/shared_config_manager:ro
      # - ../c2casgiutils/c2casgiutils:/venv/lib/python3.12/site-packages/c2casgiutils:ro
    ports:
      - '8493:8080'

  api_test_user:
    environment: *scm_env
    volumes:
      - ./app/shared_config_manager:/app/shared_config_manager:ro
      # - ../c2casgiutils/c2casgiutils:/venv/lib/python3.12/site-packages/c2casgiutils:ro
    ports:
      - '8494:8080'

  slave:
    environment: *scm_env
    volumes:
      - ./app/shared_config_manager:/app/shared_config_manager:ro
      # - ../c2casgiutils/c2casgiutils:/venv/lib/python3.12/site-packages/c2casgiutils:ro

  slave-others:
    environment: *scm_env
    volumes:
      - ./app/shared_config_manager:/app/shared_config_manager:ro
      # - ../c2casgiutils/c2casgiutils:/venv/lib/python3.12/site-packages/c2casgiutils:ro

  # tests:
